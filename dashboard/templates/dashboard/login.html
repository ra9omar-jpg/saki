<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log ind — Sakeena AI Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter','sans-serif'] } } } }
  </script>
</head>
<body class="font-sans min-h-screen flex items-center justify-center" style="background:#1C2333">
<div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm mx-4">

  <!-- Brand -->
  <div class="text-center mb-7">
    <p class="text-xs font-semibold tracking-widest uppercase text-gray-400 mb-1">Sakeena</p>
    <h1 class="text-2xl font-bold text-gray-900">AI Hub</h1>
    <p class="text-sm text-gray-400 mt-1">Log ind for at fortsætte</p>
  </div>

  <!-- Flash errors -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
    <div class="mb-4 px-3 py-2.5 rounded-lg text-sm font-medium bg-red-50 text-red-700 border border-red-200">
      {{ message }}
    </div>
    {% endfor %}
  {% endwith %}

  <!-- Login form -->
  <form method="POST" class="space-y-4">
    <div>
      <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">Adgangskode</label>
      <input
        type="password"
        id="password"
        name="password"
        autofocus
        required
        class="w-full px-3.5 py-2.5 border border-gray-300 rounded-lg text-sm text-gray-900
               focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent
               transition-shadow duration-150"
        placeholder="••••••••"
      >
    </div>
    <button
      type="submit"
      class="w-full py-2.5 px-4 rounded-lg text-sm font-semibold text-white transition-colors duration-150"
      style="background:#1C2333"
      onmouseover="this.style.background='#2d3a4f'"
      onmouseout="this.style.background='#1C2333'">
      Log ind
    </button>
  </form>
</div>
</body>
</html>
